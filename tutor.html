<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StemBot Tutor - JóvenesSTEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .chat-container {
      max-width: 600px;
      margin: 40px auto;
      background: var(--surface);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid var(--border);
    }
    
    .messages-area {
      height: 350px;
      overflow-y: auto;
      margin-top: 30px;
      margin-bottom: 20px;
      padding-right: 10px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .msg-bot {
      background: rgba(39, 126, 255, 0.1);
      border: 1px solid rgba(39, 126, 255, 0.2);
      color: var(--text-color);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg-user {
      background: var(--border);
      color: var(--text-color);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .mic-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      border: 2px solid var(--primary);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mic-btn.active {
      background: var(--primary);
      color: white;
      animation: pulse-ring 1.5s infinite;
    }
    
    #next-module-btn {
      display: none;
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      box-shadow: 0 10px 30px rgba(39,126,255,0.25);
    }
  </style>
</head>
<body>
  
  <main class="container fade-in">
    <div class="chat-container card">
      <!-- Avatar state via tutor.js -->
      <div id="bot-avatar" class="avatar">🤖</div>
      
      <div class="text-center mt-4">
        <h2 id="module-title" class="text-xl font-head font-extrabold tracking-tight">Cargando módulo...</h2>
        <p class="text-sm text-muted">Aprende conversando con StemBot</p>
      </div>
      
      <div class="messages-area" id="chat-messages">
        <!-- Messages will be injected here -->
      </div>
      
      <div class="input-row" id="input-controls">
        <button id="mic-btn" class="mic-btn" title="Hablar">🎙</button>
        <input type="text" id="text-input" class="input-text" style="flex:1;" placeholder="Escribe tu respuesta aquí..." />
        <button id="send-btn" class="btn-primary" style="padding: 12px 18px;">Enviar</button>
      </div>

      <a href="modules.html" id="next-module-btn" class="btn-primary fade-in mt-4">🎊 ¡Completado! Volver a la Playlist</a>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="tutor.js"></script>
</body>
</html>
