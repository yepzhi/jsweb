<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — JóvenesSTEM®</title>
  <meta name="description" content="Únete a JóvenesSTEM y descubre tu potencial en STEM.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#277eff;--p10:rgba(39,126,255,.10);--p20:rgba(39,126,255,.20);--teal:#00a896;--fg:#0a0a0a;--muted:#949494;--border:rgba(0,0,0,.10);--r:16px;--t:.22s cubic-bezier(.25,.46,.45,.94);}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:#0d1020;color:#fff;display:flex;align-items:center;justify-content:center;padding:48px 20px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased;}
    .bg-grid{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle at 2px 2px,rgba(138,143,173,.12) 1px,transparent 0);background-size:32px 32px;}
    .orb1{position:fixed;top:-10%;left:-5%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(39,126,255,.12) 0%,transparent 70%);pointer-events:none;}
    .orb2{position:fixed;bottom:-10%;right:-5%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,168,150,.1) 0%,transparent 70%);pointer-events:none;}

    .wrap{width:100%;max-width:440px;position:relative;z-index:1;animation:fi .6s cubic-bezier(.25,.46,.45,.94) both;}
    @keyframes fi{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

    .logo-sec{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
    .logo-link{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff;margin-bottom:16px;}
    .logo-icon{width:44px;height:44px;border-radius:14px;background:var(--primary);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(39,126,255,.45);}
    .logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.02em;}
    .logo-text em{font-style:normal;color:var(--primary);}
    h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-.03em;text-align:center;}
    .tag{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.35);margin-top:4px;}

    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:36px 32px;backdrop-filter:blur(12px);}

    .err{background:rgba(220,0,0,.1);border:1px solid rgba(220,0,0,.2);border-radius:12px;padding:12px 16px;display:none;align-items:center;gap:10px;color:#f88;font-size:.875rem;font-weight:500;margin-bottom:20px;}
    .err-dot{width:8px;height:8px;border-radius:50%;background:#f44;flex-shrink:0;}

    form{display:flex;flex-direction:column;gap:20px;}
    .fg{display:flex;flex-direction:column;gap:8px;}
    label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.45);}
    .iw{position:relative;}
    .iico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;display:flex;align-items:center;}
    input,select{width:100%;padding:14px 16px 14px 46px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.95rem;color:#fff;outline:none;transition:border-color var(--t),box-shadow var(--t);-webkit-appearance:none;appearance:none;}
    input::placeholder{color:rgba(255,255,255,.25);}
    input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(39,126,255,.2);}
    input:disabled,select:disabled{opacity:.4;cursor:not-allowed;}
    select option{background:#0d1020;color:#fff;}
    .sarrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;}

    .btn-submit{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:all var(--t);}
    .btn-submit:hover:not(:disabled){background:#1a6fee;transform:translateY(-1px);box-shadow:0 6px 24px rgba(39,126,255,.45);}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .login-link{margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,.08);text-align:center;}
    .login-link p{font-size:.9rem;font-weight:600;color:rgba(255,255,255,.4);}
    .login-link a{color:var(--primary);font-weight:800;text-decoration:none;}
    .login-link a:hover{text-decoration:underline;}
    .terms{text-align:center;margin-top:20px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.2);}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb1"></div>
<div class="orb2"></div>

<div class="wrap">
  <div class="logo-sec">
    <a href="/jsweb/" class="logo-link">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.53-4.53-9.86-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.53 4.53 9.86 6.54 11.9 4.5z"/><path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5z"/></svg>
      </div>
      <span class="logo-text">JóvenesSTEM<em>®</em></span>
    </a>
    <h1>Crea tu cuenta</h1>
    <p class="tag">Únete hoy</p>
  </div>

  <div class="card">
    <div class="err" id="err"><div class="err-dot"></div><span id="err-msg">Error</span></div>

    <form id="form">
      <!-- Name -->
      <div class="fg">
        <label for="name">Nombre Completo</label>
        <div class="iw">
          <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <input type="text" id="name" placeholder="Tu nombre" required autocomplete="name">
        </div>
      </div>
      <!-- Email -->
      <div class="fg">
        <label for="email">Correo Electrónico</label>
        <div class="iw">
          <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
          <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
        </div>
      </div>
      <!-- Age -->
      <div class="fg">
        <label for="age">Edad</label>
        <div class="iw">
          <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <select id="age" required>
            <option value="">Selecciona tu edad</option>
            <option value="6">6–10 años</option>
            <option value="11">11–14 años</option>
            <option value="15">15–18 años</option>
            <option value="18">18+ años</option>
          </select>
          <div class="sarrow"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
        </div>
      </div>
      <!-- Password -->
      <div class="fg">
        <label for="pw">Contraseña</label>
        <div class="iw">
          <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
          <input type="password" id="pw" placeholder="••••••••" required autocomplete="new-password">
        </div>
      </div>
      <!-- Confirm -->
      <div class="fg">
        <label for="cpw">Confirmar Contraseña</label>
        <div class="iw">
          <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
          <input type="password" id="cpw" placeholder="••••••••" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn-submit" id="sbtn">
        Registrarme
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="login-link">
      <p>¿Ya tienes cuenta? <a href="/jsweb/login">Inicia sesión</a></p>
    </div>
  </div>

  <p class="terms">Al registrarte, aceptas nuestros términos de servicio</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL     = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const REDIRECT = '/jsweb/dashboard?signup=success';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const form = document.getElementById('form');
  const errEl = document.getElementById('err');
  const errMsg = document.getElementById('err-msg');
  const sbtn = document.getElementById('sbtn');

  function showErr(msg){ errMsg.textContent=msg; errEl.style.display='flex'; errEl.scrollIntoView({behavior:'smooth',block:'center'}); }
  function setLoading(on){
    sbtn.disabled=on;
    sbtn.innerHTML=on?'Creando cuenta...':'Registrarme <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.style.display='none';
    const pw=document.getElementById('pw').value;
    const cpw=document.getElementById('cpw').value;
    if(pw!==cpw){ showErr('Las contraseñas no coinciden'); return; }
    setLoading(true);
    const {error}=await client.auth.signUp({
      email: document.getElementById('email').value,
      password: pw,
      options:{data:{name:document.getElementById('name').value,age:parseInt(document.getElementById('age').value)}}
    });
    if(error){ showErr(error.message||'Error al registrarse'); setLoading(false); }
    else window.location.href=REDIRECT;
  });
</script>
</body>
</html>
