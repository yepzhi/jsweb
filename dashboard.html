<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - JóvenesSTEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <main class="container" style="padding-top: 40px; padding-bottom: 60px;">
    
    <!-- Hero / Welcome -->
    <div class="text-center mb-8 fade-in">
      <h1 class="text-4xl font-head font-black tracking-tight mb-2">¡Hola, Estudiante!</h1>
      <p class="text-muted">Listo para continuar tu viaje por el universo STEM.</p>
    </div>

    <!-- Active Module Hero -->
    <div class="card fade-in" style="animation-delay: 0.1s; background: rgba(39, 126, 255, 0.05); border-color: rgba(39, 126, 255, 0.2); text-align: center; max-width: 800px; margin: 0 auto 30px;">
      <span class="badge" style="background:#fff; color:var(--primary); border:1px solid rgba(39,126,255,0.2); margin-bottom:15px;">CAPÍTULO 1</span>
      <h2 class="text-3xl font-head font-black mb-4">La Luz y el Espectro EM</h2>
      <a href="tutor.html?id=module-1-2" class="btn-primary mt-4" style="font-size:1.1rem; padding: 14px 32px; box-shadow: 0 10px 30px rgba(39,126,255,0.2);">Continuar Módulo →</a>
    </div>

    <!-- Playlist Link -->
    <a href="modules.html" class="card display-block fade-in flex justify-between items-center" style="animation-delay: 0.2s; max-width: 800px; margin: 0 auto; text-decoration: none; color: inherit;">
      <div class="flex items-center gap-4">
        <div style="font-size: 32px;">📚</div>
        <div>
          <h3 class="font-head font-bold text-xl">Explorar todos los Capítulos</h3>
          <p class="text-sm text-muted">Mira el progreso de tus módulos y descubre nuevos temas.</p>
        </div>
      </div>
      <div class="text-primary font-bold">Ir a la Playlist ➔</div>
    </a>

  </main>

  <script src="app.js"></script>
</body>
</html>
