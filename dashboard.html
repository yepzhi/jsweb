<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - JóvenesSTEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <main class="container" style="padding-top: 40px; padding-bottom: 60px;">
    
    <!-- Hero / Welcome -->
    <div class="text-center mb-8 fade-in">
      <h1 class="text-4xl font-head font-black tracking-tight mb-2">¡Hola, <span id="dash-user-name">Estudiante</span>!</h1>
      <p class="text-muted">Listo para continuar tu viaje por el universo STEM.</p>
    </div>

    <!-- Active Module Hero -->
    <div id="active-module-hero" class="card fade-in" style="animation-delay: 0.1s; background: rgba(39, 126, 255, 0.05); border-color: rgba(39, 126, 255, 0.2); text-align: center; max-width: 800px; margin: 0 auto 30px; display:none;">
      <span class="badge" style="background:#fff; color:var(--primary); border:1px solid rgba(39,126,255,0.2); margin-bottom:15px;">CONTINUAR APRENDIZAJE</span>
      <h2 id="hero-module-title" class="text-3xl font-head font-black mb-4">...</h2>
      <a id="hero-module-link" href="#" class="btn-primary mt-4" style="font-size:1.1rem; padding: 14px 32px; box-shadow: 0 10px 30px rgba(39,126,255,0.2);">Continuar Módulo →</a>
    </div>

    <!-- Playlist Link -->
    <a href="modules" class="card display-block fade-in flex justify-between items-center" style="animation-delay: 0.2s; max-width: 800px; margin: 0 auto; text-decoration: none; color: inherit;">
      <div class="flex items-center gap-4">
        <div style="color:var(--primary);">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
          </svg>
        </div>
        <div>
          <h3 class="font-head font-bold text-xl">Explorar todos los Capítulos</h3>
          <p class="text-sm text-muted">Mira el progreso de tus módulos y descubre nuevos temas.</p>
        </div>
      </div>
      <div class="text-primary font-bold">Ir a la Playlist ➔</div>
    </a>

  </main>

  <script src="app.js"></script>
</body>
</html>
