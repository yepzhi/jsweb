<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — JóvenesSTEM®</title>
  <meta name="description" content="Accede a tu Portal del Estudiante JóvenesSTEM.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

  <link rel="stylesheet" href="styles.css">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#277eff;--p10:rgba(39,126,255,.10);--p20:rgba(39,126,255,.20);--fg:#0a0a0a;--muted:#949494;--border:rgba(0,0,0,.10);--r:16px;--t:.22s cubic-bezier(.25,.46,.45,.94);}
    html{height:100%;}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;background:#fff;color:var(--fg);-webkit-font-smoothing:antialiased;}

    /* Left panel */
    .left{display:none;width:50%;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:64px;background:linear-gradient(145deg,#050510 0%,#0d1240 100%);position:relative;overflow:hidden;}
    @media(min-width:1024px){.left{display:flex;}}
    .left-dots{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 1px 1px,rgba(39,126,255,.15) 1px,transparent 0);background-size:32px 32px;}
    .left-orb{position:absolute;top:33%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(39,126,255,.22) 0%,transparent 70%);pointer-events:none;}
    .left-c{position:relative;z-index:1;}
    .left-logo{display:flex;align-items:center;text-decoration:none;color:#fff;margin-bottom:64px;transition:opacity var(--t);}
    .left-logo:hover{opacity:0.8;}
    .left-logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-.03em;}
    .left-logo-text em{font-style:normal;color:var(--primary);}
    .left-quote{font-family:'Outfit',sans-serif;font-weight:300;font-size:2rem;color:rgba(255,255,255,.9);line-height:1.35;letter-spacing:-.02em;margin-bottom:40px;}
    .left-quote strong{font-weight:800;color:#fff;}
    .left-badges{display:flex;gap:32px;}
    .lb-label{font-family:'Outfit',sans-serif;font-weight:800;font-size:.8rem;color:var(--primary);letter-spacing:.05em;}
    .lb-sub{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px;}

    /* Right form */
    .right{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px;}
    .form-wrap{width:100%;max-width:400px;animation:fi .6s cubic-bezier(.25,.46,.45,.94) both;}
    @keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

    .mob-logo{display:flex;align-items:center;margin-bottom:32px;text-decoration:none;color:var(--fg);transition:opacity var(--t);}
    .mob-logo:hover{opacity:0.8;}
    .mob-logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-.03em;}
    .mob-logo-text em{font-style:normal;color:var(--primary);}
    @media(min-width:1024px){.mob-logo{display:none;}}

    .f-ey{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--primary);margin-bottom:8px;}
    .f-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px;}
    .f-sub{font-size:.9rem;color:var(--muted);margin-bottom:28px;}

    /* Clerk container */
    #clerk-sign-in { min-height: 300px; }

    .signup{text-align:center;font-size:.875rem;color:var(--muted);margin-top:16px;}
    .signup a{color:var(--primary);font-weight:700;text-decoration:none;}
    .signup a:hover{text-decoration:underline;}

    /* Loading state */
    .auth-loading{display:flex;align-items:center;justify-content:center;min-height:260px;color:var(--muted);}
    .auth-loading svg{animation:spin 1s linear infinite;margin-right:10px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <header id="global-nav"></header>

  <div class="left page-header-gap">
    <div class="left-dots"></div>
    <div class="left-orb"></div>
    <div class="left-c">
      <a href="/jsweb/" class="left-logo">
        <span class="left-logo-text">JóvenesSTEM<em>®</em></span>
      </a>
      <blockquote class="left-quote">"La ciencia no es un destino,<br><strong>es el camino."</strong></blockquote>
      <div class="left-badges">
        <div><div class="lb-label">NGSS</div><div class="lb-sub">Estándar USA</div></div>
        <div><div class="lb-label">RENAC</div><div class="lb-sub">SEP México</div></div>
        <div><div class="lb-label">BlueBook</div><div class="lb-sub">v1 · 213 Módulos</div></div>
      </div>
    </div>
  </div>

  <!-- Right: Clerk Sign-In -->
  <div class="right">
    <div class="form-wrap">
      <a href="/jsweb/" class="mob-logo">
        <span class="mob-logo-text">JóvenesSTEM<em>®</em></span>
      </a>
      <p class="f-ey">Portal del Estudiante</p>
      <h1 class="f-title">Bienvenido de vuelta</h1>
      <p class="f-sub">Accede a tu universo de aprendizaje STEM.</p>

      <!-- Clerk mounts here -->
      <div id="clerk-sign-in">
        <div class="auth-loading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          Cargando...
        </div>
      </div>

      <p class="signup">¿No tienes cuenta? <a href="/jsweb/register">Regístrate gratis</a></p>
    </div>
  </div>

  <!-- Clerk Scripts (CDN — load before auth.js) -->
  <script
    defer
    crossorigin="anonymous"
    src="https://current-chimp-14.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"
    type="text/javascript"
  ></script>
  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y3VycmVudC1jaGltcC0xNC5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://current-chimp-14.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="auth.js?v=500" defer></script>

  <script>
    window.addEventListener('load', function () {
      window.mountClerkSignIn('clerk-sign-in', false);
    });
  </script>

  <footer id="global-footer"></footer>
  <script type="module" src="app.js?v=515"></script>
</body>
</html>
