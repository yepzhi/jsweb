<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — JóvenesSTEM®</title>
  <meta name="description" content="Únete a JóvenesSTEM y descubre tu potencial en STEM. Registro gratuito.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

  <link rel="stylesheet" href="styles.css">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#277eff;--p10:rgba(39,126,255,.10);--p20:rgba(39,126,255,.20);--teal:#00a896;--fg:#0a0a0a;--muted:#949494;--border:rgba(0,0,0,.10);--r:16px;--t:.22s cubic-bezier(.25,.46,.45,.94);}
    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      background:linear-gradient(145deg, #050510 0%, #0d1240 100%);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:100px 20px 60px;
      position:relative;
      overflow-y:auto;
      -webkit-font-smoothing:antialiased;
    }

    .bg-grid{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle at 2px 2px,rgba(138,143,173,.12) 1px,transparent 0);background-size:32px 32px;}
    .orb1{position:fixed;top:-10%;left:-5%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(39,126,255,.15) 0%,transparent 70%);pointer-events:none;}
    .orb2{position:fixed;bottom:-10%;right:-5%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,168,150,.1) 0%,transparent 70%);pointer-events:none;}

    .wrap{width:100%;max-width:480px;position:relative;z-index:1;animation:fi .6s cubic-bezier(.25,.46,.45,.94) both;}
    @keyframes fi{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

    .logo-sec{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
    .logo-link{text-decoration:none;color:#fff;}
    h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:2.2rem;letter-spacing:-.03em;text-align:center;margin-bottom:4px;}
    .tag{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.35);}

    /* Free badge */
    .free-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(0,168,150,0.15);border:1px solid rgba(0,168,150,0.35);border-radius:100px;padding:6px 16px;font-size:.72rem;font-weight:800;color:#00a896;text-transform:uppercase;letter-spacing:.1em;margin-bottom:20px;}

    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:40px;backdrop-filter:blur(20px);box-shadow:0 20px 50px rgba(0,0,0,0.3);}

    /* Clerk container inside dark card */
    #clerk-sign-up { min-height: 300px; }

    .auth-loading{display:flex;align-items:center;justify-content:center;min-height:260px;color:rgba(255,255,255,0.4);}
    .auth-loading svg{animation:spin 1s linear infinite;margin-right:10px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .login-link{margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,.08);text-align:center;}
    .login-link p{font-size:.9rem;font-weight:500;color:rgba(255,255,255,.45);}
    .login-link a{color:var(--primary);font-weight:800;text-decoration:none;margin-left:5px;}
    .login-link a:hover{text-decoration:underline;}

    .terms{text-align:center;margin-top:28px;font-size:.72rem;font-weight:600;color:rgba(255,255,255,0.2);letter-spacing:0.02em;}

    /* Features strip */
    .features{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
    .feat{display:flex;align-items:center;gap:6px;font-size:.75rem;font-weight:600;color:rgba(255,255,255,0.55);}
    .feat svg{color:var(--primary);}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>

  <header id="global-nav"></header>

  <div class="wrap">
    <div class="logo-sec">
      <a href="/jsweb/" class="logo-link">
        <h1>Crea tu cuenta</h1>
      </a>
      <p class="tag">Portal del Estudiante · Gratis</p>
    </div>

    <!-- Free features summary -->
    <div style="text-align:center; margin-bottom:20px;">
      <span class="free-pill">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        Acceso 100% Gratuito
      </span>
    </div>
    <div class="features">
      <span class="feat"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>213 Módulos</span>
      <span class="feat"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>StemBot AI</span>
      <span class="feat"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18M7 16l4-4 4 4 5-8"/></svg>Progreso en la nube</span>
    </div>

    <div class="card">
      <!-- Clerk mounts here (dark theme) -->
      <div id="clerk-sign-up">
        <div class="auth-loading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          Cargando...
        </div>
      </div>

      <div class="login-link">
        <p>¿Ya tienes cuenta? <a href="/jsweb/login">Inicia sesión</a></p>
      </div>
    </div>

    <p class="terms">Al registrarte, aceptas los términos de servicio de JóvenesSTEM®</p>
  </div>

  <!-- Clerk Scripts (CDN) -->
  <script
    defer
    crossorigin="anonymous"
    src="https://current-chimp-14.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"
    type="text/javascript"
  ></script>
  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y3VycmVudC1jaGltcC0xNC5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://current-chimp-14.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="auth.js?v=500" defer></script>

  <script>
    window.addEventListener('load', function () {
      window.mountClerkSignUp('clerk-sign-up', true);
    });
  </script>

  <footer id="global-footer"></footer>
  <script type="module" src="app.js?v=515"></script>
</body>
</html>
