<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — JóvenesSTEM®</title>
  <meta name="description" content="Únete a JóvenesSTEM y descubre tu potencial en STEM.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#277eff;--p10:rgba(39,126,255,.10);--p20:rgba(39,126,255,.20);--teal:#00a896;--fg:#0a0a0a;--muted:#949494;--border:rgba(0,0,0,.10);--r:16px;--t:.22s cubic-bezier(.25,.46,.45,.94);}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(145deg, #050510 0%, #0d1240 100%);color:#fff;display:flex;align-items:center;justify-content:center;padding:120px 20px 60px;position:relative;overflow-y:auto;-webkit-font-smoothing:antialiased;}
    
    .bg-grid{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle at 2px 2px,rgba(138,143,173,.12) 1px,transparent 0);background-size:32px 32px;}
    .orb1{position:fixed;top:-10%;left:-5%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(39,126,255,.15) 0%,transparent 70%);pointer-events:none;}
    .orb2{position:fixed;bottom:-10%;right:-5%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,168,150,.1) 0%,transparent 70%);pointer-events:none;}

    .wrap{width:100%;max-width:440px;position:relative;z-index:1;animation:fi .6s cubic-bezier(.25,.46,.45,.94) both;}
    @keyframes fi{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

    .logo-sec{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
    h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:2.2rem;letter-spacing:-.03em;text-align:center;margin-bottom:4px;}
    .tag{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.35);}

    .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:40px;backdrop-filter:blur(20px);box-shadow: 0 20px 50px rgba(0,0,0,0.3);}

    .err{background:rgba(220,0,0,.1);border:1px solid rgba(220,0,0,.2);border-radius:12px;padding:12px 16px;display:none;align-items:center;gap:10px;color:#f88;font-size:.875rem;font-weight:500;margin-bottom:24px;}
    .err-dot{width:8px;height:8px;border-radius:50%;background:#f44;flex-shrink:0;}

    form{display:flex;flex-direction:column;gap:20px;}
    .fg{display:flex;flex-direction:column;gap:8px;}
    label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);}
    .iw{position:relative;}
    .iico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;}
    
    input,select{width:100%;padding:14px 16px 14px 46px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.95rem;color:#fff;outline:none;transition:all var(--t);-webkit-appearance:none;}
    input:focus,select:focus{border-color:var(--primary);background:rgba(255,255,255,.1);box-shadow:0 0 15px rgba(39,126,255,.15);}
    select option{background:#0d112b;color:#fff;}
    .sarrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none;}

    .btn-submit{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;transition:all var(--t);}
    .btn-submit:hover:not(:disabled){background:#1a6fee;transform:translateY(-2px);box-shadow:0 8px 30px rgba(39,126,255,.4);}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;}

    .login-link{margin-top:32px;padding-top:28px;border-top:1px solid rgba(255,255,255,.08);text-align:center;}
    .login-link p{font-size:.9rem;font-weight:500;color:rgba(255,255,255,.45);}
    .login-link a{color:var(--primary);font-weight:800;text-decoration:none;margin-left:5px;}
    .login-link a:hover{text-decoration:underline;}
    
    .terms{text-align:center;margin-top:32px;font-size:.75rem;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:0.02em;}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  
  <header id="global-nav"></header>

  <div class="wrap">
    <div class="logo-sec">
      <h1>Crea tu cuenta</h1>
      <p class="tag">Portal del Estudiante</p>
    </div>

    <div class="card">
      <div class="err" id="err"><div class="err-dot"></div><span id="err-msg">Error</span></div>

      <form id="form">
        <!-- Name -->
        <div class="fg">
          <label for="name">Nombre Completo</label>
          <div class="iw">
            <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <input type="text" id="name" placeholder="Tu nombre" required>
          </div>
        </div>
        <!-- Email -->
        <div class="fg">
          <label for="email">Correo Electrónico</label>
          <div class="iw">
            <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <input type="email" id="email" placeholder="tu@email.com" required>
          </div>
        </div>
        <!-- Age -->
        <div class="fg">
          <label for="age">Edad</label>
          <div class="iw">
            <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
            <select id="age" required>
              <option value="">Selecciona tu edad</option>
              <option value="6">6–10 años</option>
              <option value="11">11–14 años</option>
              <option value="15">15–18 años</option>
              <option value="18">18+ años</option>
            </select>
            <div class="sarrow"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
          </div>
        </div>
        <!-- Password -->
        <div class="fg">
          <label for="pw">Contraseña</label>
          <div class="iw">
            <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
            <input type="password" id="pw" placeholder="••••••••" required>
          </div>
        </div>
        <!-- Confirm -->
        <div class="fg">
          <label for="cpw">Confirmar Contraseña</label>
          <div class="iw">
            <div class="iico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
            <input type="password" id="cpw" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="sbtn">
          Comenzar mi viaje
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <div class="login-link">
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
      </div>
    </div>
    
    <p class="terms">Al registrarte, aceptas nuestros términos de servicio</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const REDIRECT = 'dashboard.html?signup=success';
    const form = document.getElementById('form');
    const errEl = document.getElementById('err');
    const errMsg = document.getElementById('err-msg');
    const sbtn = document.getElementById('sbtn');

    function showErr(msg){ errMsg.textContent=msg; errEl.style.display='flex'; errEl.scrollIntoView({behavior:'smooth',block:'center'}); }
    
    function setLoading(on){
      sbtn.disabled = on;
      sbtn.innerHTML = on ? 'Registrando...' : 'Comenzar mi viaje <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.style.display='none';
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const age = document.getElementById('age').value;
      const pw = document.getElementById('pw').value;
      const cpw = document.getElementById('cpw').value;

      if(pw !== cpw) { showErr('Las contraseñas no coinciden'); return; }
      
      setLoading(true);
      
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pw);
        const user = userCredential.user;
        await updateProfile(user, { displayName: name });
        localStorage.setItem('jstem_profile', JSON.stringify({ name, age, email }));
        window.location.href = REDIRECT;
      } catch (error) {
        console.error(error);
        showErr(error.message || 'Error al registrarte');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
